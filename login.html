<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 — 리바운드</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #FF6D24;
      --orange-dim: rgba(255,109,36,0.08);
      --orange-border: rgba(255,109,36,0.2);
      --text: #302622;
      --text2: #595959;
      --text3: #888888;
      --border: #EEEEEE;
      --off: #F6F6F8;
      --kakao: #FEE500;
      --kakao-text: #181600;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fff;
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      word-break: keep-all;
      min-height: 100vh;
      display: flex; flex-direction: column;
      justify-content: flex-start; align-items: center;
      padding: 180px 20px 40px;
    }

    /* ── 상단 로고 ── */
    .login-logo {
      display: inline-flex; align-items: center; gap: 10px;
      text-decoration: none; margin-bottom: 40px;
    }

    /* ── 로그인 컨테이너 (카드 없이 배경과 연결) ── */
    .login-card {
      width: 100%; max-width: 400px;
      background: transparent;
      border: none;
      padding: 0;
      box-shadow: none;
    }
    .login-card h1 {
      font-size: 24px; font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      text-align: center;
    }
    .login-card .subtitle {
      font-size: 14px; color: var(--text3);
      margin-bottom: 32px;
      text-align: center;
    }

    /* ── 폼 ── */
    .login-form { display: flex; flex-direction: column; gap: 12px; }
    .form-field { display: flex; flex-direction: column; gap: 6px; }
    .form-field label {
      font-size: 13px; font-weight: 600; color: var(--text2);
    }
    .form-field input {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.6;
      font-family: inherit;
      color: var(--text);
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .form-field input:focus {
      outline: none;
      border-color: var(--orange);
      box-shadow: 0 0 0 3px var(--orange-dim);
    }
    .form-field input::placeholder { color: #BDBDBD; }

    /* ── 옵션 행 (자동로그인 / 비번찾기) ── */
    .form-options {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 4px; margin-bottom: 4px;
    }
    .form-options label {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--text2);
      cursor: pointer;
    }
    .form-options input[type="checkbox"] {
      width: 16px; height: 16px; accent-color: var(--orange);
      cursor: pointer;
    }
    .form-options a {
      font-size: 13px; color: var(--text3);
      text-decoration: none;
    }
    .form-options a:hover { color: var(--orange); }

    /* ── 버튼 ── */
    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--orange);
      color: #fff;
      font-size: 15px; font-weight: 700; line-height: 1.6;
      border: none; border-radius: 10px;
      cursor: pointer; font-family: inherit;
      margin-top: 8px;
      transition: opacity 0.15s;
    }
    .btn-login:hover { opacity: 0.92; }

    /* ── 구분선 ── */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 24px 0;
      font-size: 12px; color: var(--text3);
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: var(--border);
    }

    /* ── 카카오 로그인 ── */
    .btn-kakao {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%;
      padding: 14px;
      background: var(--kakao);
      color: var(--kakao-text);
      font-size: 15px; font-weight: 700; line-height: 1.6;
      border: none; border-radius: 10px;
      cursor: pointer; font-family: inherit;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn-kakao:hover { opacity: 0.92; }

    /* ── 회원가입 링크 ── */
    .signup-link {
      text-align: center;
      margin-top: 28px;
      font-size: 14px; color: var(--text3);
    }
    .signup-link a {
      color: var(--orange); font-weight: 600;
      text-decoration: none;
      margin-left: 4px;
    }
    .signup-link a:hover { text-decoration: underline; }

    /* ── 홈으로 돌아가기 ── */
    .back-home {
      margin-top: 20px;
      font-size: 13px; color: var(--text3);
      text-decoration: none;
      transition: color 0.15s;
    }
    .back-home:hover { color: var(--text); }

    /* ── 모바일 ── */
    @media (max-width: 480px) {
      body { padding: 24px 16px; justify-content: flex-start; padding-top: 60px; }
      .login-card { padding: 32px 24px; }
      .login-card h1 { font-size: 22px; }
    }
  </style>
</head>

  <!-- 로그인 컨테이너 -->
  <div class="login-card">
    <form class="login-form" onsubmit="handleLogin(event)">
      <div class="form-field">
        <label for="email">이메일</label>
        <input type="email" id="email" name="email" placeholder="example@email.com" autocomplete="email" required>
      </div>
      <div class="form-field">
        <label for="password">비밀번호</label>
        <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" autocomplete="current-password" required>
      </div>

      <div class="form-options">
        <label>
          <input type="checkbox" name="remember">
          자동 로그인
        </label>
        <a href="#">비밀번호 찾기</a>
      </div>

      <button type="submit" class="btn-login">로그인</button>
    </form>

    <div class="divider">또는</div>

    <a href="#" class="btn-kakao">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">

    <p class="signup-link">
      아직 계정이 없으신가요?<a href="#">회원가입</a>
    </p>
  </div>

  <a href="rebound-personal.html" class="back-home">← 홈으로 돌아가기</a>

      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (email === 'hgu.ekgml312@gmail.com' && password === '1234') {
        sessionStorage.setItem('rebound_logged_in', 'true');

        alert('이메일 또는 비밀번호가 올바르지 않습니다.');

    }
  </script>
